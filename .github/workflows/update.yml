name: Update Tennis Schedule

on:
  schedule:
    # 每天早上 8 点（日本时间）= UTC 23:00 前一天
    - cron: '0 23 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch schedule data
        env:
          FUREAI_USER_ID: ${{ secrets.FUREAI_USER_ID }}
          FUREAI_PASSWORD: ${{ secrets.FUREAI_PASSWORD }}
        run: python main.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "update schedule $(date -u +%Y-%m-%d)"
          git push
